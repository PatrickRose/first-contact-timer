name: E2E

on:
    push:
        branches: [develop, main]
    pull_request:
        branches: [develop, main]

jobs:
    playwright:
        runs-on: ubuntu-latest

        services:
            mongo:
                image: mongo:7
                ports:
                    - 27017:27017
                env:
                    MONGO_INITDB_ROOT_USERNAME: root
                    MONGO_INITDB_ROOT_PASSWORD: example

        env:
            # Setting MONGO_URL makes global-setup reuse this service container
            # instead of starting its own Docker Mongo. These mirror e2e/config.ts.
            MONGO_PROTOCOL: mongodb
            MONGO_URL: localhost:27017
            MONGO_USERNAME: root
            MONGO_PASSWORD: example
            MONGO_DB: firstcontact
            MONGO_OPTIONS: authSource=admin
            SECRET_COOKIE_PASSWORD: e2e-test-cookie-password-at-least-32-chars
            SECONDS_IN_PHASE: "15"

        steps:
            - uses: actions/checkout@v7
            - name: Use Node.js 24.x
              uses: actions/setup-node@v6
              with:
                  node-version: 24.x
                  cache: "npm"
            - run: npm ci
            - name: Install Playwright browser
              run: npx playwright install --with-deps chromium
            - name: Run Playwright e2e tests
              run: npm run test:e2e
            - name: Upload Playwright report
              if: ${{ !cancelled() }}
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 7
